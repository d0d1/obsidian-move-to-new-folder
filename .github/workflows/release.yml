name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches manifest version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node -e "const manifest = require('./manifest.json'); if (manifest.version !== process.env.RELEASE_TAG) { console.error('Release tag ' + process.env.RELEASE_TAG + ' does not match manifest version ' + manifest.version); process.exit(1); }"

      - name: Build plugin
        run: npm run build

      - name: Attest release assets
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            manifest.json \
            main.js \
            styles.css \
            --clobber
